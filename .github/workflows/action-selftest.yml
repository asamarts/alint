name: Action self-test

# Dogfood the official GitHub Action on the alint repo itself.
# Exercises the full install-from-release → invoke → annotate
# chain that external consumers follow, which our in-process
# tests don't cover. Runs on ubuntu-latest (not self-hosted) so
# this job represents a typical external user's environment.
#
# `uses: ./` loads action.yml from the just-checked-out commit,
# pinning each invocation to the exact commit being tested
# rather than a floating `main` ref — so a PR's action.yml
# change is exercised by *its own* action.yml, not whatever
# happens to be on main when the job runs. Closes the
# supply-chain gap where the self-test couldn't actually fail
# safely on a bad action.yml. (`uses: asamarts/alint@<expr>`
# does NOT work — GitHub Actions does not support expressions
# in `uses:` for action references, only for reusable workflow
# calls; the workflow rejects at parse time with no per-job
# logs, which is why the `@${{ github.sha }}` form silently
# 0s-failed for ~24h before this fix.)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-default:
    name: default (github annotations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: alint check (annotations)
        uses: ./
        # Default format is `github` — inline annotations on
        # the PR if run against a PR commit. Exit 0 if the repo
        # is clean against its own `.alint.yml`.

  action-sarif:
    name: sarif output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: alint check (sarif)
        id: alint
        uses: ./
        with:
          format: sarif
        continue-on-error: true
      - name: verify SARIF file exists and parses as JSON
        run: |
          set -euo pipefail
          test -f "${{ steps.alint.outputs.sarif-file }}"
          python3 -c 'import json,sys; json.load(open(sys.argv[1]))' \
            "${{ steps.alint.outputs.sarif-file }}"

  action-json:
    name: json output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: alint check (json)
        uses: ./
        with:
          format: json

  action-explicit-version:
    name: pinned version input
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: alint check with explicit version input
        uses: ./
        with:
          # Exercises install.sh's version-pinning path against
          # a specific release tag. Must name a release whose
          # CLI understands the repo's current `.alint.yml` —
          # bump when adding rule kinds the pinned version won't
          # recognize.
          version: v0.3.1

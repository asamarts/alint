name: Docs bundle

on:
  push:
    # Two triggers, same job:
    # - **main**: rolling-latest. Every commit to main rebuilds
    #   the bundle so docs stay current with the working tree
    #   between releases.
    # - **tags `v*`**: release-time guarantee. Even if a tag is
    #   pushed at an older commit (or the prior main-push bundle
    #   build failed), the tag push re-runs the bundle so the
    #   release flow always ends with fresh docs on alint.org.
    #   Treats docs as a sixth distribution channel alongside
    #   crates.io / npm / Docker / Homebrew / GH Release.
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    # Lets the alint.org repo (or a maintainer) re-trigger a
    # rebuild without a code change — useful when only a brand-
    # new alint.org consumer is being onboarded.

permissions:
  contents: write   # required to push to the docs-bundle branch

concurrency:
  # Coalesce rapid main-branch pushes — only one bundle build at
  # a time per ref, and a newer push cancels an older still-
  # running one. The tag-push trigger uses a separate group so a
  # release-time bundle build can't get cancelled by an immediate
  # follow-up main push (or vice versa).
  group: docs-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: Build + push docs bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs-bundle

      - name: Generate docs-bundle/
        run: cargo run -q -p xtask -- docs-export
        # Output lives at target/docs-bundle/.

      - name: Push to docs-bundle branch
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="$(pwd)/target/docs-bundle"
          if [[ ! -d "$BUNDLE_DIR" ]]; then
            echo "Expected bundle at $BUNDLE_DIR but it's missing."
            exit 1
          fi

          PUBLISH_DIR="$(mktemp -d)"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Branch may or may not exist yet on first run. Two
          # paths: if it does, clone it directly so we have a
          # live working tree we can wipe + repopulate; if not,
          # init a fresh orphan branch from scratch.
          if git ls-remote --heads "$REPO_URL" docs-bundle | grep -q refs/heads/docs-bundle; then
            git clone --depth 1 --branch docs-bundle "$REPO_URL" "$PUBLISH_DIR"
            cd "$PUBLISH_DIR"
            # Wipe tracked files so removed pages don't linger
            # in the published bundle.
            git rm -rf . >/dev/null 2>&1 || true
          else
            mkdir -p "$PUBLISH_DIR"
            cd "$PUBLISH_DIR"
            git init -b docs-bundle
            git remote add origin "$REPO_URL"
          fi

          cp -r "${BUNDLE_DIR}/." .
          git add -A
          git -c user.name="alint docs bot" \
              -c user.email="aliaksandr.samartsau@gmail.com" \
              commit -m "Docs bundle from ${SOURCE_SHA}" || {
            echo "No bundle changes; skipping push."
            exit 0
          }
          git push origin docs-bundle --force

      - name: Trigger alint.org rebuild
        # Cloudflare Pages exposes a deploy-hook URL per project
        # (Settings → Builds & deployments → Deploy Hooks). Stored
        # as a repo secret on asamarts/alint so the docs-bundle
        # update propagates to alint.org within seconds. If the
        # secret isn't set yet, the step is a no-op.
        env:
          HOOK: ${{ secrets.ALINT_ORG_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [[ -z "${HOOK:-}" ]]; then
            echo "ALINT_ORG_DEPLOY_HOOK not set — skipping site rebuild trigger."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK" -o /dev/null
          echo "Pinged alint.org deploy hook."

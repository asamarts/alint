name: bench-release

# Manually-dispatched per-platform benchmark run that produces a markdown
# report suitable for committing under docs/benchmarks/<version>/. Output
# is uploaded as an artifact for a maintainer to review and commit — we
# deliberately do not auto-commit, because GitHub-hosted runner variance
# should be reviewed by a human before entering the repo as a record.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the output file (e.g. v0.1)."
        required: true
        default: "v0.1"

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            install_hyperfine: sudo apt-get update && sudo apt-get install -y hyperfine
          - os: macos-latest
            platform: macos-arm64
            install_hyperfine: brew install hyperfine
          - os: windows-latest
            platform: windows-x86_64
            install_hyperfine: choco install hyperfine -y
    runs-on: ${{ matrix.os }}
    name: bench (${{ matrix.platform }})
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install hyperfine
        shell: bash
        run: ${{ matrix.install_hyperfine }}
      - name: run bench-release
        shell: bash
        run: |
          mkdir -p "docs/benchmarks/${{ github.event.inputs.version }}"
          cargo run -p xtask --release -- bench-release \
            --out "docs/benchmarks/${{ github.event.inputs.version }}/${{ matrix.platform }}.md"
      - name: upload report
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ github.event.inputs.version }}-${{ matrix.platform }}
          path: docs/benchmarks/${{ github.event.inputs.version }}/${{ matrix.platform }}.md
          if-no-files-found: error

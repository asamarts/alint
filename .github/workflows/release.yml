name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required to create GitHub Releases
  packages: write   # required to push to ghcr.io/asamarts/alint

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Preflight gate ──────────────────────────────────────────────
  # Self-contained verification that the tagged commit passes the
  # same fmt + clippy + test + doctest + `cargo doc -D warnings`
  # gates that ci.yml enforces. Required because release.yml fires
  # on tag-push in parallel with ci.yml (both watch tags: ["v*"])
  # — without this dependency, a failing CI run does not stop a
  # release. See also feedback note in CLAUDE memory:
  # `cargo doc` warnings bypass cargo check / test / clippy, so
  # the rustdoc gate must run as part of every release preflight.
  # All publishing jobs (build matrix, release, docker, npm,
  # homebrew, publish-crates) `needs:` this job; if it fails, no
  # artefacts are published.
  preflight:
    name: preflight (fmt + clippy + test + doc)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-preflight
      - name: fmt
        run: ci/scripts/fmt.sh
      - name: clippy
        run: ci/scripts/clippy.sh
      - name: test
        run: ci/scripts/test.sh
      - name: docs (cargo doc with -D warnings)
        run: ci/scripts/docs.sh

  build:
    name: build (${{ matrix.target }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: install musl-tools (native Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: build + package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.use_cross }}
          VERSION: ${{ github.ref_name }}
        run: ci/scripts/release-binary.sh

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alint-${{ matrix.target }}
          path: |
            target/release-artifacts/alint-*.tar.gz
            target/release-artifacts/alint-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: aggregate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          # Each per-file .sha256 carries the hash + basename; concatenate.
          cat *.tar.gz.sha256 > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          # install.sh lives at the repo root and is committed; copy it alongside
          # the binary tarballs so users can `curl -sSL <url>/install.sh | bash`.
          cp "${GITHUB_WORKSPACE}/install.sh" ./install.sh
          chmod +x install.sh
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "alint $TAG" \
            --generate-notes \
            install.sh SHA256SUMS \
            alint-*.tar.gz alint-*.tar.gz.sha256

  docker:
    name: push Docker image to ghcr.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: download linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: alint-*-unknown-linux-musl
          merge-multiple: true

      - name: stage binaries for each arch
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd release-artifacts
          # Tarball layout: alint-<version>-<target>/alint + docs.
          # We only need the binary; stage it under
          # docker-context/linux-<arch>/alint so the Dockerfile's
          # COPY linux-${TARGETARCH}/alint resolves per arch.
          for arch in amd64 arm64; do
            case "$arch" in
              amd64) target="x86_64-unknown-linux-musl" ;;
              arm64) target="aarch64-unknown-linux-musl" ;;
            esac
            mkdir -p "${GITHUB_WORKSPACE}/linux-${arch}"
            tar -xzf "alint-${VERSION}-${target}.tar.gz" -C /tmp
            cp "/tmp/alint-${VERSION}-${target}/alint" \
               "${GITHUB_WORKSPACE}/linux-${arch}/alint"
          done
          ls -la "${GITHUB_WORKSPACE}"/linux-*/

      # SHA-pinned per supply-chain hardening; bump alongside
      # any docker/* major-version bump. Dependabot raises a PR
      # on the comment-tagged ref so the human can vet the diff
      # before the SHA flips.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: log in to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tags
        id: tags
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # Lowercase the owner for the image reference (OCI requires
          # lowercase repo components; github.repository_owner can be
          # mixed-case).
          owner_lc="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/alint"
          # Strip the leading `v` for semver-style tags: v0.4.7 →
          # 0.4.7 + 0.4 + latest. Keep the v-prefixed tag too for
          # users who pin to the exact git tag.
          ver="${TAG#v}"
          minor="${ver%.*}"
          {
            echo "image=${image}"
            echo "tags=${image}:${TAG},${image}:${ver},${image}:${minor},${image}:latest"
          } >> "$GITHUB_OUTPUT"

      - name: build + push multi-arch image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=Apache-2.0 OR MIT
            org.opencontainers.image.description=Language-agnostic linter for repository structure

  publish-crates:
    name: publish to crates.io
    # Same gate as release/docker — confidence the code compiles
    # cross-platform before pushing to crates.io. cargo publish is
    # irreversible (only `yank` exists), so the build matrix is
    # the strongest pre-publish signal we have. Independent of
    # release/docker/homebrew failure domains: a transient
    # crates.io error here is fixed by re-running this job
    # (the script is idempotent — already-published crates are
    # skipped via the crates.io API check).
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crates
      - name: publish all 5 crates in dependency order
        env:
          # Set this in repo Settings → Secrets → Actions. Token
          # comes from https://crates.io/me; needs `publish-update`
          # scope on each of the five alint crates.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: ci/scripts/publish-crates.sh

  publish-npm:
    name: publish @asamarts/alint to npm
    # `needs: release` so the npm package's postinstall download
    # always finds the matching binary tarballs on GitHub
    # Releases. The npm tarball itself contains only the
    # install script + bin shim — no native bytes — so the build
    # matrix is irrelevant here; we just gate on the GH Release
    # being live.
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: stamp package version from tag + publish
        env:
          # Set this in repo Settings → Secrets → Actions. Token
          # is a granular access token (npmjs.com → Access
          # Tokens → Generate → Granular) with `Read and write`
          # on packages, scoped to `@asamarts`, no IP restriction.
          # We tried Trusted Publishing first but npm's UI
          # currently requires 2FA to enable it and the 2FA
          # configuration UI was broken; revisit when that ships.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          cd npm
          # Strip leading v: v0.5.11 → 0.5.11. The committed
          # source can stay at any past version (so local
          # `npm install` against the previous release still
          # works during development); CI rewrites to match
          # the release tag immediately before publishing.
          ver="${TAG#v}"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$ver';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "==> package.json version set to $ver"
          npm publish --access public

  homebrew:
    name: bump Homebrew tap (asamarts/homebrew-alint)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: download SHA256SUMS from this release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "$REPO" --pattern SHA256SUMS --output SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: load tap deploy key into ssh-agent
        # Dedicated ed25519 deploy key registered on
        # asamarts/homebrew-alint with write access; private half
        # stored as the HOMEBREW_TAP_DEPLOY_KEY secret.
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: trust github.com host key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: clone tap
        run: git clone git@github.com:asamarts/homebrew-alint.git tap

      - name: regenerate Formula/alint.rb
        env:
          VERSION: ${{ github.ref_name }}
          SHA256SUMS: ${{ github.workspace }}/SHA256SUMS
        run: ci/scripts/update-homebrew-formula.sh > tap/Formula/alint.rb

      - name: commit + push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name "alint release bot"
          git config user.email "aliaksandr.samartsau@gmail.com"
          git add Formula/alint.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${TAG}; nothing to push."
            exit 0
          fi
          git commit -m "Bump alint to ${TAG}"
          git push origin main

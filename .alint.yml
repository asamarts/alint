# Dogfood config: alint lints its own repository.
# yaml-language-server: $schema=./schemas/v1/config.json

version: 1

ignore:
  - "target/**"
  # Test fixtures deliberately contain shapes that violate our own
  # rules (PascalCase stems, backup extensions, non-text files); we
  # don't want to lint alint against them.
  - "crates/alint/tests/cli/**"

facts:
  - id: has_rust
    any_file_exists: [Cargo.toml]

rules:
  # --- when-gated -----------------------------------------------------------
  - id: rust-has-toolchain
    when: facts.has_rust
    kind: file_exists
    paths: [rust-toolchain.toml, rust-toolchain]
    root_only: true
    level: info
    message: "rust-toolchain.toml pins the compiler version for reproducible builds"


  # --- Layout (existence) -------------------------------------------------
  - id: architecture-doc-exists
    kind: file_exists
    paths: docs/design/ARCHITECTURE.md
    level: error
    message: "docs/design/ARCHITECTURE.md (architecture doc for contributors) must exist."

  - id: roadmap-doc-exists
    kind: file_exists
    paths: docs/design/ROADMAP.md
    level: error
    message: "docs/design/ROADMAP.md (scope per phase) must exist."

  - id: cargo-workspace-manifest
    kind: file_exists
    paths: Cargo.toml
    root_only: true
    level: error

  - id: gitignore-present
    kind: file_exists
    paths: .gitignore
    root_only: true
    level: warning

  - id: schema-v1-present
    kind: file_exists
    paths: schemas/v1/config.json
    level: error
    message: "schemas/v1/config.json must exist (embedded into alint-dsl via include_str!)."

  - id: readme-exists
    kind: file_exists
    paths: ["README.md", "README", "README.rst"]
    root_only: true
    level: error
    message: "A README at the repo root is required."
    policy_url: "https://opensource.guide/starting-a-project/#writing-a-readme"

  - id: license-exists
    # alint is dual-licensed Apache-2.0 OR MIT. Either root LICENSE file
    # or at least one of LICENSE-APACHE / LICENSE-MIT satisfies the rule.
    kind: file_exists
    paths:
      - "LICENSE"
      - "LICENSE.md"
      - "LICENSE.txt"
      - "LICENSE-APACHE"
      - "LICENSE-MIT"
      - "COPYING"
    root_only: true
    level: error
    message: "A LICENSE file is required."

  - id: no-committed-cargo-lock-bak
    kind: file_absent
    paths: "**/Cargo.lock.bak"
    level: error
    message: "Cargo.lock.bak is generated; don't commit it."

  - id: no-target-dir-tracked
    kind: dir_absent
    paths: "**/target"
    level: error
    message: "The Cargo build directory `target/` must not be tracked."

  # --- Naming -------------------------------------------------------------
  - id: rust-sources-snake-case
    kind: filename_case
    paths: "crates/**/src/**/*.rs"
    case: snake
    level: error
    message: "Rust module filenames must be snake_case."

  - id: toml-kebab-or-snake
    kind: filename_regex
    paths: "**/*.toml"
    stem: true
    pattern: "[a-z][a-z0-9_-]*|Cargo"
    level: warning

  # --- Content ------------------------------------------------------------
  - id: cargo-toml-is-edition-2024
    kind: file_content_matches
    paths: "Cargo.toml"
    pattern: 'edition\s*(?:=|\.workspace\s*=\s*true)'
    level: error
    message: "Root Cargo.toml must declare the 2024 edition."

  - id: no-dbg-macros-in-prod
    kind: file_content_forbidden
    paths:
      include: "crates/**/src/**/*.rs"
      exclude: "crates/**/src/**/tests.rs"
    pattern: '\bdbg!\s*\('
    level: warning
    message: "`dbg!` macros should not land in committed Rust sources."

  - id: readme-has-word-alint
    # Only runs once a README exists; harmless no-op until then.
    kind: file_content_matches
    paths: ["README.md", "README"]
    pattern: "(?i)alint"
    level: info
    message: "README should mention the project name at least once."

  - id: no-huge-committed-blobs
    kind: file_max_size
    paths: "**"
    max_bytes: 5242880          # 5 MiB
    level: warning
    message: "Committed blobs larger than 5 MiB should be reviewed."

  - id: rust-sources-are-text
    kind: file_is_text
    paths: "crates/**/src/**/*.rs"
    level: error
    message: "Rust sources must be text (no accidental binary commits)."

  # --- Text hygiene (Phase 1) --------------------------------------------
  - id: rust-no-trailing-ws
    kind: no_trailing_whitespace
    paths: "crates/**/src/**/*.rs"
    level: warning

  - id: rust-final-newline
    kind: final_newline
    paths: "crates/**/src/**/*.rs"
    level: warning

  - id: all-sources-lf-endings
    # Repo is Linux-native; CRLF on a tracked source file almost
    # always means a Windows editor / drag-and-drop artifact.
    kind: line_endings
    paths:
      include: ["crates/**/src/**/*.rs", "**/*.toml", "**/*.yml", "**/*.md"]
    target: lf
    level: warning

  # --- Security / Unicode (Phase 2) --------------------------------------
  - id: no-merge-markers
    kind: no_merge_conflict_markers
    paths:
      include: ["crates/**/src/**/*.rs", "**/*.toml", "**/*.yml", "**/*.md"]
    level: error

  - id: no-bidi-in-sources
    # Trojan Source (CVE-2021-42574) defense.
    kind: no_bidi_controls
    paths: "crates/**/src/**/*.rs"
    level: error

  - id: no-zero-width-in-sources
    kind: no_zero_width_chars
    paths: "crates/**/src/**/*.rs"
    level: error

  # --- Encoding (Phase 3) ------------------------------------------------
  - id: no-bom-in-sources
    kind: no_bom
    paths: ["crates/**/src/**/*.rs", "**/*.toml", "**/*.yml"]
    level: warning

  # --- Portable metadata (Phase 5) ---------------------------------------
  - id: no-case-collisions
    kind: no_case_conflicts
    paths: "**"
    level: error
    message: "Paths that differ only by case break checkouts on macOS/Windows defaults."

  - id: no-illegal-windows-names
    kind: no_illegal_windows_names
    paths: "**"
    level: warning

  # --- Unix metadata + git (Phase 6) -------------------------------------
  - id: no-tracked-symlinks
    kind: no_symlinks
    paths: "**"
    level: warning

  - id: ci-scripts-are-executable
    kind: executable_bit
    paths: "ci/**/*.sh"
    require: true
    level: warning

  - id: ci-shebang-needs-exec
    kind: shebang_has_executable
    paths: "ci/**/*.sh"
    level: warning

  - id: ci-exec-needs-shebang
    kind: executable_has_shebang
    paths: "ci/**/*.sh"
    level: warning

  - id: no-git-submodules
    kind: no_submodules
    level: warning

  # --- Hygiene + fingerprint (Phase 7) -----------------------------------
  - id: rust-max-blank-lines
    # rustfmt typically collapses runs to a single blank line; an
    # explicit rule here flags any that slip through manual edits.
    kind: max_consecutive_blank_lines
    paths: "crates/**/src/**/*.rs"
    max: 1
    level: warning

  # --- Bundled ruleset shape ---------------------------------------------
  # Each YAML under crates/alint-dsl/rulesets/v1/ is the source of truth for
  # one bundled ruleset AND the source of truth for that ruleset's docs page
  # (xtask docs-export parses the leading comment block as the page's
  # overview, then embeds the YAML verbatim under "## Source"). The format
  # below is what the docs generator expects:
  #
  #     # alint://bundled/<name>@v<rev>
  #     #
  #     # <prose description>
  #     ...
  #     version: 1
  #
  # Without the URI tag on line 1 the page renders with a missing or wrong
  # title; without the `#`-blank-then-prose pattern the overview is empty
  # and the page reads as "rules dumped onto a blank slate." The unit test
  # in alint-dsl/bundled.rs gives faster feedback (cargo-test scale), this
  # rule surfaces it in the linter output where contributors will see it.
  - id: bundled-ruleset-has-uri-header
    kind: file_header
    paths: "crates/alint-dsl/rulesets/v1/**/*.yml"
    lines: 3
    pattern: '\A# alint://bundled/[a-z0-9/_-]+@v\d+\n#\n# \S'
    level: error
    message: >-
      Bundled ruleset YAMLs must start with `# alint://bundled/<name>@v<rev>`
      on line 1, a blank `#` on line 2, and a prose description starting on
      line 3 (parsed by xtask docs-export as the page overview).

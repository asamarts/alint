name: file_absent is silent when no match exists
tags: [check, file_absent, passing]

given:
  tree:
    Cargo.toml: "[package]\nname = \"demo\"\n"
    src:
      main.rs: "fn main() {}"
  config: |
    version: 1
    rules:
      - id: no-bak-files
        kind: file_absent
        paths: "**/*.bak"
        level: error

when: [check]

expect:
  - violations: []

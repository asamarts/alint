name: any_file_exists fact evaluates true when at least one listed file is present
tags: [check, facts, any_file_exists]

given:
  tree:
    Cargo.toml: "[package]\nname = \"demo\"\n"
    src:
      main.rs: "fn main() {}"
  config: |
    version: 1
    facts:
      - id: is_rust
        any_file_exists: [Cargo.toml, rust-toolchain.toml]
    rules:
      - id: rust-has-toolchain
        when: facts.is_rust
        kind: file_exists
        paths: [rust-toolchain.toml, rust-toolchain]
        level: error

when: [check]

expect:
  - violations:
      - {rule: rust-has-toolchain, level: error}

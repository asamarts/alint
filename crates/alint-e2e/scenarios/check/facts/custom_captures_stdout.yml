name: custom fact exposes command stdout to when-gating
# Tagged unix-only because the fact's argv shells out to
# `/bin/sh` which doesn't exist on Windows. Linux + macOS
# both honor the fact path.
tags: [check, facts, custom, unix, unix-only]

given:
  tree:
    LICENSE: "MIT"
  config: |
    version: 1
    facts:
      - id: lic
        custom:
          argv: ["/bin/sh", "-c", "printf 'MIT\\n'"]
    rules:
      - id: mit-requires-ack
        when: facts.lic == "MIT"
        kind: file_exists
        paths: LICENSE-ACK.txt
        level: error

when: [check]

expect:
  - violations:
      - {rule: mit-requires-ack, level: error}

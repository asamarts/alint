name: file_content_matches is silent when the pattern is present
tags: [check, file_content_matches, passing]

given:
  tree:
    README.md: "# Project\n\nSPDX-License-Identifier: Apache-2.0\n\nA short description.\n"
  config: |
    version: 1
    rules:
      - id: spdx-in-readme
        kind: file_content_matches
        paths: "README.md"
        pattern: "SPDX-License-Identifier"
        level: warning

when: [check]

expect:
  - violations: []

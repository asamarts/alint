name: file_ends_with flags files missing the required suffix
tags: [check, file_ends_with, content]

given:
  tree:
    build:
      ok.generated.md: "# hi\n\n<!-- generated by alint -->\n"
      stripped.generated.md: "# hi\n"
      wrong_tail.generated.md: "# hi\n\n<!-- generated by somebody else -->\n"
  config: |
    version: 1
    rules:
      - id: gen-sentinel
        kind: file_ends_with
        paths: "build/**/*.generated.md"
        suffix: "<!-- generated by alint -->\n"
        level: error

when: [check]

expect:
  - violations:
      - {rule: gen-sentinel, level: error, path: build/stripped.generated.md}
      - {rule: gen-sentinel, level: error, path: build/wrong_tail.generated.md}

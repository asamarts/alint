name: file_ends_with is silent when every file ends with the suffix
tags: [check, file_ends_with, content, passing]

given:
  tree:
    build:
      a.generated.md: "# hi\n\n<!-- generated by alint -->\n"
      b.generated.md: "# world\n\n<!-- generated by alint -->\n"
  config: |
    version: 1
    rules:
      - id: gen-sentinel
        kind: file_ends_with
        paths: "build/**/*.generated.md"
        suffix: "<!-- generated by alint -->\n"
        level: error

when: [check]

expect:
  - violations: []

name: git_no_denied_paths fires when a tracked path matches a denylist entry
tags: [check, git_no_denied_paths, git, failing]

given:
  tree:
    README.md: "# demo\n"
    .env: "SECRET=swordfish\n"
  config: |
    version: 1
    respect_gitignore: false
    rules:
      - id: no-tracked-secrets
        kind: git_no_denied_paths
        denied:
          - "*.env"
          - ".env*"
        level: error
  git:
    init: true
    add: [README.md, .env]
    commit: true

when: [check]

expect:
  - violations:
      - {rule: no-tracked-secrets, level: error, path: .env}

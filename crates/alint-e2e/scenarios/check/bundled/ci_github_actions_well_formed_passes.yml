name: alint://bundled/ci/github-actions — silent on a Scorecard-clean workflow
tags: [check, extends, bundled, ci, github-actions, passing]

# A workflow that hits every Scorecard check the bundled
# ruleset enforces: explicit `name:`, `permissions.contents:
# read`, and every `uses:` pinned to a 40-char commit SHA.

given:
  tree:
    ".github":
      workflows:
        "ci.yml": |
          name: CI
          on: push
          permissions:
            contents: read
          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b
                - run: echo hi
  config: |
    version: 1
    extends:
      - alint://bundled/ci/github-actions@v1

when: [check]

expect:
  - violations: []

name: alint://bundled/node is silent on a well-formed npm project
tags: [check, extends, bundled, node, passing]

given:
  tree:
    package.json: |
      {
        "name": "demo",
        "version": "0.1.0",
        "engines": { "node": ">=20" }
      }
    package-lock.json: |
      { "name": "demo", "lockfileVersion": 3, "packages": {} }
    .nvmrc: "20\n"
    src:
      index.ts: "export const hi = () => 'hi';\n"
  config: |
    version: 1
    extends:
      - alint://bundled/node@v1

when: [check]

expect:
  - violations: []

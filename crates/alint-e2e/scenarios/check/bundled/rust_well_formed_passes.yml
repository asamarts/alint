name: alint://bundled/rust is silent on a clean Rust workspace
tags: [check, extends, bundled, rust, passing]

given:
  tree:
    Cargo.toml: |
      [workspace]
      members = ["crates/demo"]

      [workspace.package]
      version = "0.1.0"
    Cargo.lock: |
      # This file is automatically @generated by Cargo.
    rust-toolchain.toml: |
      [toolchain]
      channel = "stable"
    crates:
      demo:
        Cargo.toml: |
          [package]
          name = "demo"
          version.workspace = true
        src:
          lib.rs: "pub fn hi() {}\n"
  config: |
    version: 1
    extends:
      - alint://bundled/rust@v1

when: [check]

expect:
  - violations: []

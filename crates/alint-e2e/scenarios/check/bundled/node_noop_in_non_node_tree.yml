name: alint://bundled/node stays quiet in a non-Node tree
tags: [check, extends, bundled, node, passing]

# Every node@v1 rule is gated `when: facts.is_node`, so this
# ruleset is a safe no-op when package.json is absent.
given:
  tree:
    Cargo.toml: |
      [package]
      name = "demo"
      version = "0.1.0"
    src:
      lib.rs: "pub fn hi() {}\n"
  config: |
    version: 1
    extends:
      - alint://bundled/node@v1

when: [check]

expect:
  - violations: []

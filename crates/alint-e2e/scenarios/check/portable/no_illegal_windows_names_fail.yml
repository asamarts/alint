name: no_illegal_windows_names flags reserved and forbidden names
# Tagged unix-only because the testkit can't actually materialize
# `CON`/`NUL`/`COM1`/etc. on Windows — the OS rejects the name at
# create-time, leaving nothing for the rule to flag. The whole
# point of this rule is to flag those names *before* they ship to
# a Windows user, so it ironically only exercises on non-Windows
# CI lanes. The `linux-only` analogue isn't right here since
# macOS also creates these names freely.
tags: [check, no_illegal_windows_names, portable, unix-only]

given:
  tree:
    README.md: "# fine"
    "con.txt": ""
    "NUL": ""
    "COM1.md": ""
    "trailing_dot.": ""
  config: |
    version: 1
    rules:
      - id: no-win-reserved
        kind: no_illegal_windows_names
        paths: "**"
        level: error

when: [check]

expect:
  - violations:
      - {rule: no-win-reserved, level: error, path: COM1.md}
      - {rule: no-win-reserved, level: error, path: NUL}
      - {rule: no-win-reserved, level: error, path: con.txt}
      - {rule: no-win-reserved, level: error, path: "trailing_dot."}

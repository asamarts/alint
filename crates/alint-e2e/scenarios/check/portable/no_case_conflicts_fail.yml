name: no_case_conflicts flags pairs that differ only by case
# Note: this scenario only materializes faithfully on case-
# sensitive filesystems. The `requires-case-sensitive-fs` tag
# tells the harness to skip this on macOS APFS / Windows NTFS
# in their default configurations — there the second file
# would silently overwrite the first during materialization,
# leaving nothing for the rule to flag.
tags: [check, no_case_conflicts, portable, requires-case-sensitive-fs]

given:
  tree:
    README.md: "# upper"
    readme.md: "# lower"
    other.txt: ""
  config: |
    version: 1
    rules:
      - id: no-case
        kind: no_case_conflicts
        paths: "**"
        level: error

when: [check]

expect:
  - violations:
      - {rule: no-case, level: error, path: README.md}
      - {rule: no-case, level: error, path: readme.md}

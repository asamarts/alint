name: compliance/apache-2@v1 — source files missing the Apache header fire
tags: [check, bundled, compliance, apache-2]

# LICENSE + NOTICE are in place. `src/lib.rs` has the
# canonical Apache header; `src/util.py` doesn't. Only the
# missing one fires.

given:
  tree:
    LICENSE: |
      Apache License
      Version 2.0, January 2004
    NOTICE: |
      Copyright 2026 Acme Corp
    src:
      lib.rs: |
        // Copyright 2026 Acme Corp
        //
        // Licensed under the Apache License, Version 2.0 (the "License");

        pub fn hello() {}
      util.py: |
        # No Apache header — should fire.
        def util():
            pass
  config: |
    version: 1
    extends:
      - alint://bundled/compliance/apache-2@v1

when: [check]

expect:
  - violations:
      - {rule: apache-2-source-has-license-header, level: warning, path: "src/util.py"}

name: compliance/apache-2@v1 — missing NOTICE fires
tags: [check, bundled, compliance, apache-2]

# LICENSE + source headers are in place, but no NOTICE at
# the repo root. Per Apache-2.0 §4(d) — and the canonical
# Apache project pattern — projects ship a NOTICE alongside
# LICENSE. Only the notice-file rule fires.

given:
  tree:
    LICENSE: |
      Apache License
      Version 2.0, January 2004
    src:
      lib.rs: |
        // Copyright 2026 Acme Corp
        //
        // Licensed under the Apache License, Version 2.0 (the "License");

        pub fn hello() {}
  config: |
    version: 1
    extends:
      - alint://bundled/compliance/apache-2@v1

when: [check]

expect:
  - violations:
      - {rule: apache-2-notice-file-exists, level: warning}

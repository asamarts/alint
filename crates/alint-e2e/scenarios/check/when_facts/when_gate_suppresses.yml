name: when clause suppresses a rule when its fact evaluates false
tags: [check, when, facts]

given:
  tree:
    package.json: "{}"
    src:
      index.js: "module.exports = {};"
  config: |
    version: 1
    facts:
      - id: has_rust
        any_file_exists: [Cargo.toml]
    rules:
      - id: rust-has-toolchain
        when: facts.has_rust
        kind: file_exists
        paths: [rust-toolchain.toml, rust-toolchain]
        level: error

when: [check]

expect:
  - violations: []

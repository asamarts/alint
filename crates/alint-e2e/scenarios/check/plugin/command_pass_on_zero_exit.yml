name: command plugin is silent when the wrapped CLI exits 0
# Tagged `linux-only` because /bin/true behaves differently on
# the GitHub-hosted macOS runner (the rule fires unexpectedly —
# whether due to a stripped userland, sandboxing, or env-var
# size limits hasn't been pinned down). Linux runners exercise
# the happy path; macOS divergence is tracked separately.
tags: [check, command, plugin, passing, linux-only]

# Uses `/bin/true` so the test stays portable on any Unix-like
# system without depending on a specific tool being installed.
# The Windows runner has no `/bin/true`, but the trycmd CLI tests
# already cover that platform — these e2e scenarios are unix-only
# in practice, mirroring the testkit's tree-spec materialisation.

given:
  tree:
    src:
      main.rs: "fn main() {}\n"
  config: |
    version: 1
    rules:
      - id: trivial-pass
        kind: command
        paths: "src/**/*.rs"
        command: ["/bin/true"]
        level: error

when: [check]

expect:
  - violations: []

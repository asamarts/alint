name: for_each_dir passes when every selected directory satisfies the require
tags: [check, for_each_dir, cross_file, passing]

given:
  tree:
    src:
      alpha:
        mod.rs: "pub fn a() {}"
      beta:
        mod.rs: "pub fn b() {}"
  config: |
    version: 1
    rules:
      - id: every-module-has-mod
        kind: for_each_dir
        select: "src/*"
        require:
          - kind: file_exists
            paths: "{path}/mod.rs"
        level: error

when: [check]

expect:
  - violations: []

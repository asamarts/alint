name: file_hash passes when content matches declared SHA-256
tags: [check, file_hash, encoding, passing]

given:
  tree:
    reference.txt: "hello world\n"
  config: |
    version: 1
    rules:
      - id: locked-content
        kind: file_hash
        paths: reference.txt
        sha256: "a948904f2f0f479b8f8197694b30184b0d2ed1c1cd2a1ec0fb85d299a192a447"
        level: error

when: [check]

expect:
  - violations: []
